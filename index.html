<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Flatpickr for Date Formatting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- Fuse.js for Fuzzy Search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
</head>

<body>
    <div class="glass-container large-container">

        <div class="header-section">
            <div class="title-area">
                <h1>Transactions</h1>
                <p class="subtitle">Manage your expenses and incomes seamlessly.</p>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="add-tab">Add Transaction</button>
                <button class="tab-btn" data-tab="history-tab">History</button>
                <a href="https://docs.google.com/spreadsheets/d/1Zg5q5LS8Oj1IIbXkVy_2c6BfQr8SvldHJtyfWPnUXQU/edit?gid=399413726#gid=399413726"
                    target="_blank" class="secondary-btn" title="Open Google Sheet"
                    style="text-decoration: none; display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    Sheet
                </a>
            </div>
        </div>

        <!-- Add Transaction Tab -->
        <div id="add-tab" class="tab-content active">
            <form id="transaction-form">
                <div class="form-grid">
                    <!-- Row 1 -->
                    <div class="input-group">
                        <label for="Date">Date</label>
                        <input type="text" id="Date" name="Date" required placeholder="Select Date">
                    </div>
                    <div class="input-group">
                        <label for="Direction">Direction</label>
                        <select id="Direction" name="Direction" required>
                            <option value="Money Out">Money Out</option>
                            <option value="Money In">Money In</option>
                        </select>
                    </div>

                    <!-- Row 2 -->
                    <div class="input-group">
                        <label for="AmountOrig">Amount (Orig)</label>
                        <input type="number" id="AmountOrig" name="AmountOrig" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="input-group">
                        <label for="Curr">Currency</label>
                        <select id="Curr" name="Curr" required>
                            <option value="THB">THB</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="JPY">JPY</option>
                            <option value="SGD">SGD</option>
                        </select>
                    </div>

                    <!-- Row 3 -->
                    <div class="input-group">
                        <label for="AmountTHB">Amount (THB)</label>
                        <input type="number" id="AmountTHB" name="AmountTHB" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="input-group">
                        <label for="Category">Category</label>
                        <select id="Category" name="Category" required>
                            <option value="Revenue – subscriptions">Revenue – subscriptions</option>
                            <option value="Grant funding">Grant funding</option>
                            <option value="Founder capital injection">Founder capital injection</option>
                            <option value="Other income">Other income</option>
                            <option value="Software & SaaS">Software & SaaS</option>
                            <option value="Web Infrastructure & hosting">Web Infrastructure & hosting</option>
                            <option value="AI / API costs">AI / API costs</option>
                            <option value="Legal & registration">Legal & registration</option>
                            <option value="Accounting & compliance">Accounting & compliance</option>
                            <option value="Marketing & ads">Marketing & ads</option>
                            <option value="Contractors & freelancers">Contractors & freelancers</option>
                            <option value="Salaries & wages">Salaries & wages</option>
                            <option value="Equipment & hardware">Equipment & hardware</option>
                            <option value="Office & admin">Office & admin</option>
                            <option value="Bank & payment fees">Bank & payment fees</option>
                            <option value="Travel & meals">Travel & meals</option>
                            <option value="Other expense">Other expense</option>
                        </select>
                    </div>

                    <!-- Row 4 -->
                    <div class="input-group full-width" style="position: relative;">
                        <label for="Vendor">Vendor</label>
                        <input type="text" id="Vendor" name="Vendor" placeholder="e.g. Google, Grab, Amazon" required
                            autocomplete="off">
                        <div id="vendor-suggestions" class="suggestions-box hidden"></div>
                    </div>

                    <!-- Row 5 -->
                    <div class="input-group full-width">
                        <label for="Description">Description</label>
                        <input type="text" id="Description" name="Description"
                            placeholder="Brief description of the transaction" required>
                    </div>

                    <!-- Row 6 -->
                    <div class="input-group">
                        <label for="Account">Account</label>
                        <select id="Account" name="Account" required>
                            <option value="Account กระแสรายวัน">Account กระแสรายวัน</option>
                            <option value="Personal card (temp)">Personal card (temp)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="PaidBy">Paid By</label>
                        <select id="PaidBy" name="PaidBy" required>
                            <option value="Company">Company</option>
                            <option value="Fu (CEO)">Fu (CEO)</option>
                            <option value="Arty (COO)">Arty (COO)</option>
                            <option value="Meme (CMO)">Meme (CMO)</option>
                        </select>
                    </div>

                    <!-- Row 7 -->
                    <div class="input-group">
                        <label for="Reimburse">Reimburse?</label>
                        <select id="Reimburse" name="Reimburse" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="Status">Status</label>
                        <select id="Status" name="Status" required>
                            <option value="Logged">Logged</option>
                            <option value="Pending">Pending</option>
                            <option value="Approved">Approved</option>
                            <option value="Paid">Paid</option>
                        </select>
                    </div>

                    <!-- Row 8 -->
                    <div class="input-group">
                        <label for="ReceiptRef">Receipt Ref</label>
                        <input type="text" id="ReceiptRef" name="ReceiptRef" placeholder="Link or ID to receipt"
                            value="None">
                    </div>
                    <div class="input-group">
                        <label for="ReceiptFile">Upload Receipt</label>
                        <input type="file" id="ReceiptFile" name="ReceiptFile" accept="image/*,.pdf"
                            style="padding: 0.5rem 1rem; cursor: pointer;">
                    </div>
                </div>

                <div class="submit-container">
                    <button type="submit" id="submit-btn" class="primary-btn">
                        <span id="btn-text">Add Transaction</span>
                        <div id="loading-spinner" class="spinner hidden"></div>
                    </button>
                </div>

                <div id="add-notification" class="notification hidden"></div>
            </form>
        </div>

        <!-- History Tab -->
        <div id="history-tab" class="tab-content">
            <div class="history-controls">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search vendor, description, amount...">
                </div>
                <div class="filters">
                    <select id="filter-year">
                        <option value="">All Years</option>
                    </select>
                    <select id="filter-month">
                        <option value="">All Months</option>
                    </select>
                    <select id="filter-category">
                        <option value="">All Categories</option>
                    </select>
                    <button id="refresh-btn" class="secondary-btn">
                        <span>Refresh</span>
                        <div id="refresh-spinner" class="spinner hidden"></div>
                    </button>
                </div>
            </div>

            <div id="history-notification" class="notification hidden"></div>

            <div class="table-container">
                <table id="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Vendor</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Direction</th>
                            <th>Amount (THB)</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="8" class="text-center">Loading transactions...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
